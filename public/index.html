<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letters From Detention</title>
  <meta name="description" content="Letters From Detention - Stories from people in immigration detention across the United States.">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="page">

    <header class="header" data-testid="header">
      <h1 class="header-title" data-testid="text-page-title">Letters From Detention</h1>
      <div class="header-icons">
        <div class="search-icon" data-testid="button-search">
          <div class="search-circle"></div>
          <div class="search-handle"></div>
        </div>
        <div class="hamburger" data-testid="button-menu">
          <div class="hamburger-line"></div>
          <div class="hamburger-line"></div>
          <div class="hamburger-line"></div>
        </div>
      </div>
    </header>

    <div class="divider"></div>

    <section class="hero" data-testid="section-hero">
      <div class="hero-quote" data-testid="text-hero-quote">
        Lorem ipsum dolor sit amet, consectetur adipiscing elit. In vitae urna non orci tristique tempor. Integer malesuada mollis felis.
      </div>
    </section>

    <div id="lettersContainer" data-testid="letters-container"></div>

    <footer class="footer" data-testid="footer">
      <span class="footer-text">share on social</span>
      <div class="social-icons">
        <a class="social-icon" data-testid="button-social-instagram" aria-label="Instagram">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2zm0 1.5A4.25 4.25 0 0 0 3.5 7.75v8.5A4.25 4.25 0 0 0 7.75 20.5h8.5A4.25 4.25 0 0 0 20.5 16.25v-8.5A4.25 4.25 0 0 0 16.25 3.5h-8.5zM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 1.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7zm5.25-2.5a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg>
        </a>
        <a class="social-icon" data-testid="button-social-x" aria-label="X">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </a>
        <a class="social-icon" data-testid="button-social-facebook" aria-label="Facebook">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"/></svg>
        </a>
      </div>
    </footer>

  </div>

  <div class="modal-overlay" id="letterModal" data-testid="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modalName" aria-describedby="modalTranslation">
    <div class="modal-content" data-testid="modal-content">
      <button class="modal-close" id="modalClose" data-testid="button-modal-close" aria-label="Close letter detail">&times;</button>
      <div class="modal-body">
        <div class="modal-images-container" id="modalImagesContainer" data-testid="modal-images-container">
        </div>
        <div class="modal-text-wrapper">
          <h2 class="modal-name" id="modalName" data-testid="text-modal-name"></h2>
          <p class="modal-translation" id="modalTranslation" data-testid="text-modal-translation"></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var modal = document.getElementById('letterModal');
      var modalImagesContainer = document.getElementById('modalImagesContainer');
      var modalName = document.getElementById('modalName');
      var modalTranslation = document.getElementById('modalTranslation');
      var modalClose = document.getElementById('modalClose');
      var container = document.getElementById('lettersContainer');
      var lastFocusedCard = null;
      var lettersData = [];

      function openModal(letterIndex) {
        var letter = lettersData[letterIndex];
        if (!letter) return;

        lastFocusedCard = document.querySelector('[data-letter-index="' + letterIndex + '"]');

        modalImagesContainer.innerHTML = '';
        letter.images.forEach(function(src, imgIdx) {
          var wrapper = document.createElement('div');
          wrapper.className = 'modal-image-wrapper';
          var img = document.createElement('img');
          img.className = 'modal-image';
          img.alt = 'Letter image ' + (imgIdx + 1);
          img.src = src;
          img.setAttribute('data-testid', 'img-modal-letter-' + imgIdx);
          wrapper.appendChild(img);
          modalImagesContainer.appendChild(wrapper);
        });

        modalName.textContent = letter.firstName;
        modalTranslation.textContent = letter.translation;

        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
        modalClose.focus();
      }

      function closeModal() {
        modal.classList.remove('active');
        document.body.style.overflow = '';
        if (lastFocusedCard) {
          lastFocusedCard.focus();
          lastFocusedCard = null;
        }
      }

      function createCard(letter, index) {
        var card = document.createElement('div');
        card.className = 'letter-card';
        card.setAttribute('data-testid', 'card-letter-' + letter.stateAbbr.toLowerCase() + '-' + (index + 1));
        card.setAttribute('data-letter-index', lettersData.indexOf(letter));
        card.setAttribute('tabindex', '0');
        card.setAttribute('role', 'button');
        card.style.cursor = 'pointer';

        var imgWrapper = document.createElement('div');
        imgWrapper.className = 'card-image-wrapper';
        var img = document.createElement('img');
        img.className = 'card-image';
        img.alt = 'Person photo';
        img.src = letter.images[0] || '';
        imgWrapper.appendChild(img);

        var content = document.createElement('div');
        content.className = 'card-content';

        var name = document.createElement('div');
        name.className = 'card-name';
        name.textContent = letter.firstName;

        var desc = document.createElement('ul');
        desc.className = 'card-description';
        letter.descriptions.forEach(function(d) {
          var li = document.createElement('li');
          li.textContent = d;
          desc.appendChild(li);
        });

        content.appendChild(name);
        content.appendChild(desc);
        card.appendChild(imgWrapper);
        card.appendChild(content);

        var letterIdx = lettersData.indexOf(letter);
        card.addEventListener('click', function() {
          openModal(letterIdx);
        });
        card.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            openModal(letterIdx);
          }
        });

        return card;
      }

      function renderLetters(letters) {
        lettersData = letters;
        container.innerHTML = '';

        var stateGroups = {};
        var stateOrder = [];
        letters.forEach(function(letter) {
          if (!stateGroups[letter.state]) {
            stateGroups[letter.state] = [];
            stateOrder.push(letter.state);
          }
          stateGroups[letter.state].push(letter);
        });

        stateOrder.forEach(function(stateName) {
          var group = stateGroups[stateName];
          var stateSlug = stateName.toLowerCase().replace(/\s+/g, '-');

          var section = document.createElement('section');
          section.className = 'state-section';
          section.setAttribute('data-testid', 'section-' + stateSlug);

          var title = document.createElement('h2');
          title.className = 'state-title';
          title.setAttribute('data-testid', 'text-state-' + stateSlug);
          title.textContent = stateName;

          var divider = document.createElement('div');
          divider.className = 'state-divider';

          var grid = document.createElement('div');
          grid.className = 'cards-grid';

          group.forEach(function(letter, idx) {
            grid.appendChild(createCard(letter, idx));
          });

          section.appendChild(title);
          section.appendChild(divider);
          section.appendChild(grid);
          container.appendChild(section);
        });
      }

      fetch('/api/letters')
        .then(function(res) { return res.json(); })
        .then(function(data) {
          renderLetters(data);
        })
        .catch(function(err) {
          console.error('Failed to load letters:', err);
          container.innerHTML = '<p style="padding: 50px; text-align: center;">Failed to load letters. Please try again later.</p>';
        });

      modalClose.addEventListener('click', function(e) {
        e.stopPropagation();
        closeModal();
      });

      modal.addEventListener('click', function(e) {
        if (e.target === modal) {
          closeModal();
        }
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && modal.classList.contains('active')) {
          closeModal();
        }
      });
    })();
  </script>
</body>
</html>
