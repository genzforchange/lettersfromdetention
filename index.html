<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Letters From Detention</title>
    <meta
      name="description"
      content="Letters From Detention - Stories from people in immigration detention across the United States."
    />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <header class="header" data-testid="header">
        <h1 class="header-title" data-testid="text-page-title">
          Letters From Detention
        </h1>
        <div class="header-icons">
          <div class="search-icon" data-testid="button-search">
            <div class="search-circle"></div>
            <div class="search-handle"></div>
          </div>
        </div>
      </header>

      <div class="divider"></div>

      <div
        class="search-bar-container"
        id="searchBarContainer"
        data-testid="search-bar-container"
      >
        <input
          type="text"
          class="search-input"
          id="searchInput"
          data-testid="input-search"
          placeholder="Search Letters..."
          aria-label="Search Letters"
        />
      </div>

      <section class="hero" data-testid="section-hero">
        <img class="hero-image" src="assets/background.png" alt="Background image" />
        <div class="hero-quote" data-testid="text-hero-quote">
          Every letter is a life. Letters From Detention amplifies the voices of
          people in immigration detention across the United States.
        </div>
      </section>

      <div id="lettersContainer" data-testid="letters-container"></div>

      <footer class="footer" data-testid="footer">
        <div class="footer-row1">
          <span class="footer-text">share on social</span>
          <div class="social-icons">
            <a
              class="social-icon"
              data-testid="button-social-instagram"
              aria-label="Instagram"
            >
              <svg viewBox="0 0 24 24" width="22" height="22" fill="white">
                <path
                  d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2zm0 1.5A4.25 4.25 0 0 0 3.5 7.75v8.5A4.25 4.25 0 0 0 7.75 20.5h8.5A4.25 4.25 0 0 0 20.5 16.25v-8.5A4.25 4.25 0 0 0 16.25 3.5h-8.5zM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 1.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7zm5.25-2.5a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"
                />
              </svg>
            </a>
            <a class="social-icon" data-testid="button-social-x" aria-label="X">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="white">
                <path
                  d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"
                />
              </svg>
            </a>
            <a
              class="social-icon"
              data-testid="button-social-facebook"
              aria-label="Facebook"
            >
              <svg viewBox="0 0 24 24" width="22" height="22" fill="white">
                <path
                  d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"
                />
              </svg>
            </a>
          </div>
        </div>
        <span class="notice"
          >made with love by gen-z for change x casa de paz</span
        >
      </footer>
    </div>

    <div
      class="modal-overlay"
      id="letterModal"
      data-testid="modal-overlay"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modalName"
      aria-describedby="modalTranslation"
    >
      <div class="modal-content" data-testid="modal-content">
        <button
          class="modal-close"
          id="modalClose"
          data-testid="button-modal-close"
          aria-label="Close letter detail"
        >
          &times;
        </button>
        <div class="modal-body">
          <div
            class="modal-images-container"
            id="modalImagesContainer"
            data-testid="modal-images-container"
          ></div>
          <div class="modal-text-wrapper">
            <h2
              class="modal-name"
              id="modalName"
              data-testid="text-modal-name"
            ></h2>
            <p
              class="modal-translation"
              id="modalTranslation"
              data-testid="text-modal-translation"
            ></p>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
